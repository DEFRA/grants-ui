name: Check Pull Request

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - edited
      - reopened
      - synchronize
      - ready_for_review

jobs:
  test:
    name: Test and Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run checks
        run: |
          npm run format:check
          npm run lint
          npm test
        env:
          EXAMPLE_GRANT_WITH_AUTH_WHITELIST_CRNS: "1101009926 1101010029 1101014318 1101016409 1101019239"
          EXAMPLE_GRANT_WITH_AUTH_WHITELIST_SBIS: "106953974 115766011 106380686 110191709 115816271"

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage

