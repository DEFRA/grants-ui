x-common-postgres: &common-postgres
  POSTGRES_PORT: 5432
  POSTGRES_DB: ${POSTGRES_DB:-land_grants_api}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-land_grants_api}
  POSTGRES_USER: ${POSTGRES_USER:-land_grants_api}

services:
  localstack:
    volumes:
      - ./localstack/start-localstack-land-grants.sh:/etc/localstack/init/ready.d/start-localstack-land-grants.sh

  grants-ui:
    depends_on:
      land-grants-backend:
        condition: service_healthy
    environment:
      LAND_GRANTS_API_URL: http://land-grants-backend:3009

  land-grants-backend-postgres:
    platform: linux/amd64
    image: defradigital/land-grants-postgres-seeded:latest
    pull_policy: always
    environment:
      <<: *common-postgres
    ports:
      - 5432:5432
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}']
      interval: 30s
      start_interval: 1s
      timeout: 3s
      retries: 5
      start_period: 10s
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - grants-ui-net

  land-grants-backend:
    platform: linux/amd64
    image: defradigital/land-grants-api:latest
    pull_policy: always
    env_file:
      - 'localstack/aws.env'
    environment:
      <<: *common-postgres
      PORT: 3009
      NODE_ENV: local
      DISABLE_POSTGRES: false
      POSTGRES_HOST: land-grants-backend-postgres
      LAND_GRANTS_AUTH_TOKEN: ${LAND_GRANTS_API_AUTH_TOKEN:-auth_token}
      LAND_GRANTS_ENCRYPTION_KEY: ${LAND_GRANTS_API_ENCRYPTION_KEY:-encryption_key}
      AWS_ENDPOINT_URL: http://localstack:4566
      GRANTS_CONFIG_QUEUE_URL: http://localstack:4566/000000000000/grants_config_broker_update
      GRANTS_CONFIG_BUCKET: configs-bucket
      SQS_ENDPOINT: http://localstack:4566
      S3_ENDPOINT: http://localstack:4566
    healthcheck:
      test: ['CMD-SHELL', 'node -e "require(''http'').get(''http://localhost:3009/health'', r => process.exit(r.statusCode === 200 ? 0 : 1)).on(''error'', () => process.exit(1))"']
      interval: 30s
      start_interval: 1s
      timeout: 3s
      retries: 5
      start_period: 10s
    ports:
      - 3009:3009
    depends_on:
      land-grants-backend-postgres:
        condition: service_healthy
      localstack:
        condition: service_healthy
    networks:
      - grants-ui-net

volumes:
  postgres_data:
