engine: V2
name: Woodland Management Plan
metadata:
  id: 95e92559-968d-44ae-8666-2b1ad3dffd38
  enabledInProd: false
  referenceNumberPrefix: WMP
  submission:
    grantCode: woodland
  grantRedirectRules:
    preSubmission:
      - toPath: '/tasks'
    postSubmission:
      # Cleared - APPLICATION_WITHDRAWN status
      - fromGrantsStatus: SUBMITTED,REOPENED
        gasStatus: APPLICATION_WITHDRAWN
        toGrantsStatus: CLEARED
        toPath: /start

      # Awaiting amendments
      - fromGrantsStatus: SUBMITTED
        gasStatus: APPLICATION_AMEND
        toGrantsStatus: REOPENED
        toPath: /tasks

      # Offer sent, withdrawn, accepted -> agreements service
      - fromGrantsStatus: 'SUBMITTED'
        gasStatus: 'OFFER_SENT,OFFER_WITHDRAWN,OFFER_ACCEPTED'
        toGrantsStatus: 'SUBMITTED'
        toPath: /agreements

      # Reopened
      - fromGrantsStatus: REOPENED
        gasStatus: default
        toGrantsStatus: REOPENED
        toPath: /tasks

      # Submitted -> confirmation (default for most GAS statuses)
      - fromGrantsStatus: SUBMITTED
        gasStatus: default
        toGrantsStatus: SUBMITTED
        toPath: /confirmation

      # Default fallback
      - fromGrantsStatus: default
        gasStatus: default
        toGrantsStatus: SUBMITTED
        toPath: /confirmation
  detailsPage:
    confirmationFieldName: businessDetailsUpToDate
    query:
      name: Business
      entities:
        - name: customer
          variableName: crn
          variableSource: credentials.crn
          fields:
            - path: info
              fields:
                - path: name
                  fields:
                    - path: first
                    - path: last
        - name: business
          variableName: sbi
          variableSource: credentials.sbi
          fields:
            - path: info
              fields:
                - path: reference
                - path: email
                  fields:
                    - path: address
                - path: phone
                  fields:
                    - path: mobile
                    - path: landline
                - path: name
                - path: address
                  fields:
                    - path: line1
                    - path: line2
                    - path: line3
                    - path: line4
                    - path: line5
                    - path: street
                    - path: city
                    - path: postalCode
                    - path: uprn
                    - path: county
                    - path: buildingName
                    - path: buildingNumberRange
                    - path: dependentLocality
                    - path: doubleDependentLocality
                    - path: flatName
                    - path: pafOrganisationName
                - path: vat
            - path: countyParishHoldings
              fields:
                - path: cphNumber
    responseMapping:
      business: data.business.info
      countyParishHoldings: data.business.countyParishHoldings[0].cphNumber
      customer: data.customer.info
    displaySections:
      - title: Applicant details
        fields:
          - label: Applicant name
            sourcePath: customer.name
            format: fullName
      - title: Organisation details
        description: If your application is successful, the following organisation will receive the Woodland Management Plan grant.
        fields:
          - label: Organisation name
            sourcePath: business.name
          - label: Single Business Identifier (SBI) number
            sourceType: credentials
            sourcePath: sbi
          - label: Organisation email
            sourcePath: business.email.address
          - label: Mobile phone number
            sourcePath: business.phone.mobile
          - label: Landline phone number
            sourcePath: business.phone.landline
          - label: Organisation address
            sourcePath: business.address
            format: address
          - label: VAT registration number
            sourcePath: business.vat
      - title: County parish holding (CPH) numbers
        fields:
          - label: CPH number
            sourcePath: countyParishHoldings
  tasklist:
    completeInOrder: true
    returnAfterSection: true
    showCompletionStatus: false
    statuses:
      cannotStart:
        text: 'Cannot start yet'
        classes: 'govuk-tag--grey'
      notStarted:
        text: 'Not started'
        classes: 'govuk-tag--blue'
      completed:
        text: 'Completed'
        classes: 'govuk-tag--green'
  confirmationContent:
    panelTitle: 'Application submitted'
    panelText: 'Application reference number'
    html: |
      <p class="govuk-body">We've sent a confirmation email.</p>
      <h2 class="govuk-heading-m">What happens next</h2>
      <p class="govuk-body">We've received your application.</p>
      <p class="govuk-body">We'll be in contact to say if your application has been successful or to ask for more information.</p>
      <p class="govuk-body">If successful, we'll send you a grant funding agreement (GFA).</p>

      <details class="govuk-details" data-module="govuk-details">
        <summary class="govuk-details__summary">
          <span class="govuk-details__summary-text">
            If you have a question
          </span>
        </summary>
        <div class="govuk-details__text">
          <p class="govuk-body">Contact the Rural Payments Agency if you have a query.</p>
          <p class="govuk-body">
            Telephone: 03000 200 301<br>
            Monday to Friday, 8:30am to 5pm (except bank holidays)</p>
          <p class="govuk-body"><a class="govuk-link" href="https://www.gov.uk/call-charges" target="_blank">Find out about call charges (opens in new tab)</a></p>
          <p class="govuk-body">Email: <a class="govuk-link" href="mailto:ruralpayments@defra.gov.uk">ruralpayments@defra.gov.uk</a></p>
        </div>
      </details>

sections:
  - name: business-details
    title: Your details
    id: af79b6c8-3ed1-4150-a172-9d721023c25d
  - name: check-your-eligibility
    title: Check your eligibility
    id: 16848e5e-ba30-4719-aa98-f0e1144fb492
  - name: about-your-woodland
    title: About your woodland
    id: 38507a39-c936-4c4f-872a-bcbae2eeb7d5
  - name: check-and-submit
    title: Check and submit application
    id: 52a9d09a-a977-4993-aa40-8eb77a4cd200

pages:
  # ==========================================
  # Pre-task-list pages (no section)
  # ==========================================

  # Start page
  - title: Apply for a Woodland Management Plan grant
    id: 4afc672b-71d6-4889-999d-c7934184f3cc
    path: /start
    controller: StartPageController
    components:
      - name: startInfoOne
        id: eb6eda3b-57ee-4440-bb0f-18e2a189bd8e
        type: Html
        content: >-
          <p class="govuk-body">Use this service to apply for a Woodland Management Plan (WMP) grant.</p>
          <p class="govuk-body">A WMP grant helps you to create a management plan for your woodland. This plan will set out how you intend to manage your woodland over the agreement period.</p>
      - name: startInfoTwo
        id: 24172324-4841-445c-b1fb-4f377596d826
        type: Html
        content: >
          <h2 class="govuk-heading-s">Before you start</h2>
          <p class="govuk-body">To use this service, you need:</p>
          <ul class="govuk-list govuk-list--bullet">
          <li>a Rural Payments service account</li>
          <li>your land registered with the Rural Payments service</li>
          <li>details of your woodland</li>
          </ul>
          <p class="govuk-body">If you do not enter any information for more
          than 20 minutes, your application will time out and you will have to
          start again.</p>
          <h2 class="govuk-heading-s">Problems using the online service</h2>
          <p class="govuk-body">If you have any problems using the online
          service, contact the RPA.</p>
          <h2 class="govuk-heading-s">Telephone</h2>
          <p class="govuk-body">Telephone: 03000 200 301</p>
          <p class="govuk-body">Monday to Friday, 9am to 5pm (except public
          holidays)</p>

  # Check details page
  - title: Confirm your details
    path: /check-details
    section: af79b6c8-3ed1-4150-a172-9d721023c25d
    controller: CheckDetailsController
    id: a24cb35f-a359-4934-b8c8-56ff92cb3df1

  # Task list page
  - title: Woodland Management Plan
    id: fd1c8e7c-9b0a-4c3b-9c5a-2f8e5a9f8b6d
    path: /tasks
    controller: TaskListPageController
    components:
      - name: taskListGuidance
        id: 184a3b28-53a2-4154-a544-f7d641106dc0
        type: Details
        title: Help with your application
        content: |
          <p class="govuk-body">This task list helps you track your progress through the application. Each section contains one or more tasks that must be completed.</p>
          <p class="govuk-body">Tasks will show as 'Completed' as they are populated. You must complete all sections before you can submit your application.</p>
          <p class="govuk-body">If you need to change any information you have already provided, you can go back to any completed section and update your answers. The status will update automatically as you progress through the application.</p>
        options:
          position: above

  # ==========================================
  # Section 1: Check your eligibility
  # ==========================================

  # 1. Land registered
  - title: Is all the land in your application registered with the Rural Payments service?
    id: db67ebae-7851-4cd8-b22f-c74a7eb2e73d
    path: /eligibility-land-registered
    section: 16848e5e-ba30-4719-aa98-f0e1144fb492
    controller: TaskPageController
    components:
      - name: landRegisteredWithRpa
        id: eac135f5-78b1-4179-ab7d-d122befa6bd8
        type: YesNoField
        title: Is all the land in your application registered with the Rural Payments service?
        options:
          required: true
          classes: govuk-radios
        shortDescription: Land registration

  # 2. Exit - land not registered
  - title: All the land in your application must be registered with the Rural Payments service
    id: e692dbd0-57ec-4237-90fd-1bac172c9f94
    path: /exit-eligibility-land-registered
    controller: TerminalPageController
    condition: f64f8509-4b15-48a1-b301-5463f23e8b42
    components:
      - name: landNotRegisteredInfo
        id: 6503008c-d3e0-4236-b0a6-09d409c2a818
        type: Html
        content: >
          <p class="govuk-body">You must register all the land parcels you want to include in any application for rural payments.</p>
          <p class="govuk-body">This includes funding schemes such as the Sustainable Farming Incentive (SFI) and Countryside Stewardship (CS) Higher Tier and Capital Grants.</p>
          <h2 class="govuk-heading-m">Check land parcels</h2>
          <p class="govuk-body">All land parcels listed in your application must be registered on your digital maps in the Rural Payments service and have a parcel reference number (in the format AA1234 5678) before you apply.</p>
          <p class="govuk-body">To find out if your land parcels are registered and up to date follow our <a class="govuk-link" href="https://www.gov.uk/guidance/digital-maps-in-the-rural-payments-service-check-and-change-mapping-updates" target="_blank">Digital maps in the Rural Payments service: check and change your maps guidance (opens in new tab)</a>.</p>
          <h2 class="govuk-heading-m">Register land parcels</h2>
          <p class="govuk-body">If your land parcels are not registered, you must register the land and wait for this to be completed before applying.</p>
          <p class="govuk-body">To register land follow our <a class="govuk-link" href="https://www.ruralpayments.service.gov.uk/" target="_blank">Rural Payments service: how to register land and update digital maps guidance (opens in new tab)</a>.</p>

  # 3. Management control
  - title: Will you have management control for the duration of the agreement and, where applicable, the durability period?
    id: 4bdbaa10-d57a-4e94-8a2b-c442658ca4a7
    path: /eligibility-management-control
    section: 16848e5e-ba30-4719-aa98-f0e1144fb492
    controller: TaskPageController
    components:
      - name: landManagementControl
        id: e0dcf5be-0b8f-4e50-befe-bdfe858e82a6
        type: YesNoField
        title: Will you have management control for the duration of the agreement and, where applicable, the durability period?
        hint: Having management control means you're the person actively farming the land in your application. You must have management control of the land in an agreement for 5 years from your agreement start date. The durability period is the period where you must keep all funded capital items in the same condition and to the specification in your agreement, and use them only for the approved grant purpose. This is usually for a minimum of 7 years from the agreement start date.
        options:
          required: true
          classes: govuk-radios
        shortDescription: Management control

  # 4. Countersignature (only shown when management control = no)
  - title: Have you got the countersignature of your landlord?
    id: 7498379b-f8f1-4f51-b27e-805f06e0bd6a
    path: /eligibility-countersignature
    section: 16848e5e-ba30-4719-aa98-f0e1144fb492
    controller: TaskPageController
    condition: 88a3283b-64fe-4e2b-aa14-5faca0333006
    components:
      - name: counterSignature
        id: 040d6021-bc32-4ef8-9cfe-235548157a30
        type: YesNoField
        title: Have you got the countersignature of your landlord?
        hint: You need your landlord's countersignature to confirm management control for the duration of the agreement and, where applicable, the durability period.
        options:
          required: true
          classes: govuk-radios
        shortDescription: Landlord countersignature

  # 6. Exit - no countersignature
  - title: You must get your landlord's countersignature
    id: ba713319-438e-4609-afbb-2585686bb491
    path: /exit-eligibility-countersignature
    controller: TerminalPageController
    condition: b9f02e95-e022-4b6d-a8fb-dbe56124c03f
    components:
      - name: noCountersignatureInfo
        id: 5af8ba37-9ac6-47a3-a5a9-e9716ab5141e
        type: Html
        content: >
          <p class="govuk-body">You must get written consent from your landlord before you can apply for a Woodland Management Plan grant.</p>
          <p class="govuk-body">You can download the
          <a class="govuk-link" href="https://www.gov.uk/government/publications/countryside-stewardship-land-ownership-and-control-form" target="_blank">Land ownership and control form: Countryside Stewardship form (opens in new tab)</a>
          to get your landlord's countersignature.</p>

  # 7. Tenant
  - title: Are you a tenant of a public body?
    id: 8e65ecdb-22c7-4d9f-9500-af90718e61e1
    path: /eligibility-tenant
    section: 16848e5e-ba30-4719-aa98-f0e1144fb492
    controller: TaskPageController
    components:
      - name: publicBodyTenant
        id: bdff80de-080b-4fdd-a323-9762ef558ae8
        type: YesNoField
        title: Are you a tenant of a public body?
        hint: If you are a tenant of a public body, you'll need to check if the land is eligible for a WMP with your landlord.
        options:
          required: true
          classes: govuk-radios
        shortDescription: Public body tenancy

  # 8. Tenant obligations (conditional - only if tenant = yes)
  - title: Are the proposed works a requirement of your tenancy or any other legally binding obligation?
    id: aa0a2606-ad5b-46db-8c4c-3bf503fa23f9
    path: /eligibility-tenant-obligations
    section: 16848e5e-ba30-4719-aa98-f0e1144fb492
    controller: TaskPageController
    condition: b977ed06-398f-4bc7-aae8-a363c4183c3a
    components:
      - name: tenantObligations
        id: f025cbb2-920c-4b07-9cfa-d43589369696
        type: YesNoField
        title: Are the proposed works a requirement of your tenancy or any other legally binding obligation?
        hint: This includes any legally binding obligation such as a condition of planning permission or a covenant.
        options:
          required: true
          classes: govuk-radios
        shortDescription: Tenancy obligations

  # 9. Exit - tenant obligations
  - title: You cannot get a WMP grant for any proposed works which are a requirement of your tenancy or any other legally binding obligation
    id: 566edfd9-2028-490f-8928-0d3b75e7eb4e
    path: /exit-eligibility-tenant-obligations
    controller: TerminalPageController
    condition: d8ae9ed4-da31-41fb-a5d7-0025cc823c21
    components:
      - name: tenantObligationsExitInfo
        id: 10a8335b-877c-436f-8a0d-e09d6cf53f71
        type: Html
        content: >
          <p class="govuk-body">You cannot get a Woodland Management Plan grant for any proposed works which are a requirement of your tenancy or any other legally binding obligation.</p>
          <p class="govuk-body">You can read the
          <a class="govuk-link" href="#" target="_blank">Applicant's guide: PA3 Woodland management plan 2026 guidance (opens in new tab)</a>
          for more information.</p>

  # 10. Grazing rights
  - title: Are you applying for land covered by common or shared grazing rights?
    id: 3f4d21fd-7cf9-4c3e-9026-d9506cf94cb1
    path: /eligibility-grazing-rights
    section: 16848e5e-ba30-4719-aa98-f0e1144fb492
    controller: TaskPageController
    components:
      - name: landHasGrazingRights
        id: 540e77e4-13ec-4393-aee4-6ceed9cb91ed
        type: YesNoField
        title: Are you applying for land covered by common or shared grazing rights?
        options:
          required: true
          classes: govuk-radios
        shortDescription: Grazing rights

  # 11. Valid WMP
  - title: Do you already have any valid WMPs on any land in your application?
    id: 93f46dcc-d0db-484e-9eb6-4ba5766c220d
    path: /eligibility-valid-wmp
    section: 16848e5e-ba30-4719-aa98-f0e1144fb492
    controller: TaskPageController
    components:
      - name: appLandHasExistingWmp
        id: e6a99259-82d6-4d2a-a2ec-349e9d473092
        type: YesNoField
        title: Do you already have any valid WMPs on any land in your application?
        options:
          required: true
          classes: govuk-radios
        shortDescription: Existing WMPs

  # 12. WMP agreement number (conditional - only if valid-wmp = yes)
  - title: Enter the agreement number for any valid WMPs
    id: c8cf57d5-b410-4cfe-8bbd-1a912119b7ab
    path: /eligibility-wmp-agreement
    section: 16848e5e-ba30-4719-aa98-f0e1144fb492
    controller: TaskPageController
    condition: 7d822521-d6cc-4b1a-9538-8b9f18d7bdfc
    components:
      - name: existingWmps
        id: a9ae25aa-d70e-4616-84bf-47f71251e8b5
        type: TextField
        title: Enter the agreement number for any valid WMPs
        hint: If you have more than one valid WMP, enter each agreement number separated by a comma.
        options:
          required: true
          classes: govuk-!-width-two-thirds
          customValidationMessages:
            any.required: Enter the agreement number for your valid WMP
        shortDescription: WMP agreement number

  # 13. Higher tier
  - title: Do you intend to apply for a Countryside Stewardship Higher Tier (CSHT) agreement if your WMP is approved?
    id: 11c06c84-fb48-479e-98e2-27549195e4bd
    path: /eligibility-higher-tier
    section: 16848e5e-ba30-4719-aa98-f0e1144fb492
    controller: TaskPageController
    components:
      - name: higherTierGuidance
        id: 50a8fb82-ec37-4c57-83af-81e56aaf4506
        type: Html
        content: >-
          <p class="govuk-body">You can read the
          <a class="govuk-link" href="#" target="_blank">Applicant's guide: PA3 Woodland management plan 2026 guidance (opens in new tab)</a>
          for more information about Countryside Stewardship Higher Tier agreements.</p>
      - name: intendToApplyHigherTier
        id: e7d51cad-e4ea-4478-a12b-fedf3d18039d
        type: YesNoField
        title: ''
        options:
          required: true
          classes: govuk-radios
        shortDescription: Higher Tier intention

  # ==========================================
  # Section 2: About your woodland (placeholder)
  # ==========================================

  - title: Select all the eligible land parcels for the location of your woodland
    id: 5d8f5a78-8c19-4b3c-94fd-0ce7bdd5b038
    path: /land-parcels
    section: 38507a39-c936-4c4f-872a-bcbae2eeb7d5
    controller: CommonSelectLandParcelPageController
    components:
      - name: landParcels
        type: CheckboxesField
        title: Select land parcels
        shortDescription: Select land parcels
    config:
      showSupportDetails: false
      enableMultipleParcelSelect: true
      topSection: |
        <div class="govuk-body">
          <p>
            You must include all woodland on your holding in your application. A holding
            is all the land in the same geographical location that is managed as a unit.
          </p>

          <p>
            For larger holdings, this is all woodland within the same geographical
            location.
          </p>

          <p>
            Land parcels must be entirely within England and defined as an area of land
            that:
          </p>

          <ul class="govuk-list govuk-list--bullet">
            <li>is at least 0.5 hectares</li>
            <li>has an average width of at least 20 metres</li>
            <li>
              is a group or line of trees that are, or will reach, at least 5 metres in height
            </li>
            <li>has a crown cover of more than 20% of the ground area</li>
          </ul>

          <p>
            The woodland must be larger than 0.5 hectares in total. The total area for the
            application can be made up of separate blocks of woodland but the minimum
            block size must be 0.5ha.
          </p>

          <p>
            To find out more about what land is eligible for a WMP read our
            <a href="https://www.gov.uk/government/publications/pa3-woodland-management-plan-2026/applicants-guide-pa3-woodland-management-plan-2026#landthat-is-eligible-for-a-wmp" class="govuk-link">
              Applicant's guide: PA3 Woodland management plan 2026 guidance
            </a>.
          </p>
        </div>
  - title: Enter total area of woodland in your application
    id: 2c807ed2-18d7-4c9c-afa9-e6f10edfbca7
    path: /total-area-of-woodland
    section: 38507a39-c936-4c4f-872a-bcbae2eeb7d5
    controller: WoodlandHectaresPageController
    components:
      - name: woodlandHectaresGuidance
        id: 1a3b5c7d-9e2f-4a8b-c6d0-e4f2a8b6c0d2
        type: Html
        content: >-
          <p class="govuk-body">The woodland must be at least 0.5 hectares (ha) in total.</p>
          <div class="govuk-inset-text">
           {% if totalHectaresAppliedFor %}
              The total area of your selected land parcels is {{ totalHectaresAppliedFor }} ha
           {% else %}
              The total area of your selected land parcels is 0 ha
           {% endif %}
          </div>
          <p class="govuk-body">We use a combination of the total area and age of the eligible woodland in your application to work out what you may get paid.</p>
          <p class="govuk-body">To find out more about what you'll get paid read our <a href="#" class="govuk-link">Applicant's guide: PA3 Woodland management plan 2026 guidance</a>.</p>
      - name: hectaresTenOrOverYearsOld
        id: 0232c1df-965f-4f41-a271-cb469ca9623a
        type: NumberField
        title: Enter total area of woodland over 10 years old
        options:
          required: true
          classes: govuk-input--width-5
          suffix: ha
        shortDescription: Woodland over 10 years old
      - name: hectaresUnderTenYearsOld
        id: b564e6d8-8675-4c9c-9ef8-002199386cf5
        type: NumberField
        title: Enter total area of newly planted woodland under 10 years old
        options:
          required: false
          classes: govuk-input--width-5
          suffix: ha
        shortDescription: Newly planted woodland under 10 years old

  - title: Enter the grid reference for the centre of your woodland
    id: df178ed5-da13-4d90-b856-e95f19a92f73
    path: /centre-of-woodland
    section: 38507a39-c936-4c4f-872a-bcbae2eeb7d5
    controller: TaskPageController
    components:
      - name: centreOfWoodlandGuidance
        id: 0ecc3968-5293-4a17-adeb-426a51327507
        type: Html
        content: |
          <p class="govuk-body">To find the grid reference use <a href="" class="govuk-link">Natural England’s ‘MAGIC’ map website</a>.</p>
          <p class="govuk-body">To find out how to get the grid reference read the ‘MAGIC’ guidance on <a href="" class="govuk-link">Using the Where Am I Tool</a>.</p>
          <p class="govuk-body">The grid reference will be shown as the ‘National Grid Field No’ and include 2 letters and 8 numbers. For example, SP 4178 2432 </p>
      - name: centreGridReference
        id: db02edf0-7c90-4470-a306-55d0f69d217c
        type: NationalGridFieldNumberField
        title: ''
        options:
          required: true
          customValidationMessages:
            string.empty: Enter a grid reference
          classes: govuk-input--width-10
        shortDescription: Centre of your woodland

  - title: Which Forestry Commission team will be advising you?
    id: cf70a8f0-7826-4452-ab6c-4e228ebaa334
    path: /which-forestry-commission-team
    section: 38507a39-c936-4c4f-872a-bcbae2eeb7d5
    controller: TaskPageController
    components:
      - name: fcTeamCode
