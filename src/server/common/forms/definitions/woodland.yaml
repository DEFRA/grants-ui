name: Grants
metadata:
  id: 95e92559-968d-44ae-8666-2b1ad3dffd38
  enabledInProd: true
  submission:
    grantCode: woodland
  grantRedirectRules: null
  detailsPage:
    query:
      name: Business
      entities:
        - name: customer
          variableName: crn
          variableSource: credentials.crn
          fields:
            - path: info
              fields:
                - path: name
                  fields:
                    - path: first
                    - path: last
        - name: business
          variableName: sbi
          variableSource: credentials.sbi
          fields:
            - path: info
              fields:
                - path: name
                - path: reference
    responseMapping:
      business: data.business.info
      countyParishHoldings: data.business.countyParishHoldings[0].cphNumber
      customer: data.customer.info
    displaySections:
      - title: Applicant details
        fields:
          - label: Applicant name
            sourcePath: customer.name
            format: fullName
      - title: Organisation details
        description: If your application is successful, the following organisation will receive the MSFP grant.
        fields:
          - label: Organisation name
            sourcePath: business.name
          - label: Single Business Identifier (SBI) number
            sourceType: credentials
            sourcePath: sbi
          - label: Organisation email
            sourcePath: business.email.address
          - label: Mobile phone number
            sourcePath: business.phone.mobile
          - label: Landline phone number
            sourcePath: business.phone.landline
          - label: Organisation address
            sourcePath: business.address
            format: address
          - label: VAT registration number
            sourcePath: business.vat
      - title: County parish holding (CPH) numbers
        fields:
          - label: CPH number
            sourcePath: countyParishHoldings
  tasklist:
    completeInOrder: true # Optional, defaults to true - must complete tasks in order
    returnAfterSection: true # Optional, defaults to true - returns to task list after each section
    showCompletionStatus: true # Optional, defaults to true - show "X of Y" completion status
    statuses: # Optional completion status display overrides (defaults shown below)
      cannotStart:
        text: 'Cannot start yet'
        classes: 'govuk-tag--grey'
      notStarted:
        text: 'Not started'
        classes: 'govuk-tag--blue'
      completed:
        text: 'Completed'
        classes: 'govuk-tag--green'
  confirmationContent:
    html: >
      <h2 class="govuk-heading-m">What happens next</h2>
      <p class="govuk-body">We will review your application.</p>
pages:
  - title: Check if you can apply for a woodlands grant
    path: /start
    controller: StartPageController
    components:
      - name: startInfoOne
        title: Html
        type: Html
        content: >-
          <p class="govuk-body">Use this service to:</p>
          <ul class="govuk-list govuk-list--bullet">
          <li>check if you can apply for wings for your pigs (takes about 3
          minutes)</li>
          <li>get an estimate of your grant funding (takes about 5 minutes if
          you have all the pig details)</li>
          </ul>
          <p class="govuk-body">You can apply if you:</p>
          <ul class="govuk-list govuk-list--bullet">
          <li>are a pig farmer</li>
          <li>have between 1 and 1,000 pigs</li>
          <li>will use the wings in England</li>
          <li>want to super-power your pigs</li>
          </ul>
        id: eb6eda3b-57ee-4440-bb0f-18e2a189bd8e
        options: {}
        schema: {}
      - name: startInsetText
        title: Inset text
        type: InsetText
        content: If your project is eligible, you can submit your answers to the Rural
          Payments Agency (RPA) to request the full application form.
        id: bbceb617-7602-49f1-8a53-251c6b3dccef
        options: {}
        schema: {}
      - name: startInfoTwo
        title: Html
        type: Html
        content: >
          <h2 class="govuk-heading-s">Grant funding rates</h2>
          <p class="govuk-body">You can get funding for:</p>
          <ul class="govuk-list govuk-list--bullet">
          <li>£10 per pig for Large White breeds</li>
          <li>£15 per pig for British Landrace breeds</li>
          <li>£18 per pig for Berkshire breeds</li>
          <li>£10 per pig for other breeds</li>
          </ul>
          <h2 class="govuk-heading-s">Before you start</h2>
          <p class="govuk-body">To use the checker, you need:</p>
          <ul class="govuk-list govuk-list--bullet">
          <li>information about your farming business</li>
          <li>the number and breeds of pigs you have</li>
          <li>your contact details and business address</li>
          </ul>
          <p class="govuk-body">If you do not enter any information for more
          than 20 minutes, your application will time out and you will have to
          start again.</p>
          <h2 class="govuk-heading-s">Problems using the online service</h2>
          <p class="govuk-body">If you have any problems using the online
          service, contact the RPA.</p>
          <h2 class="govuk-heading-s">Telephone</h2>
          <p class="govuk-body">Telephone: 03000 200 301</p>
          <p class="govuk-body">Monday to Friday, 9am to 5pm (except public
          holidays)</p>
        id: 24172324-4841-445c-b1fb-4f377596d826
        options: {}
        schema: {}
    id: 4afc672b-71d6-4889-999d-c7934184f3cc
  - title: Check your details are correct
    path: /check-details
    controller: CheckDetailsController
    next: [ ]
    id: a24cb35f-a359-4934-b8c8-56ff92cb3df1
  - title: Read all guidance
    id: 9c8b1a0e-5c3d-4f1b-9c7a-2c8e5a9f8b6d
    path: /read-all-guidance
    components:
      - name: readGuidanceInfo
        title: Have you read all the guidance content prompt in here
        type: YesNoField
  - title: Example Task List
    id: fd1c8e7c-9b0a-4c3b-9c5a-2f8e5a9f8b6d
    path: /task-list
    controller: TaskListPageController
    components:
      - name: taskListGuidance
        id: 184a3b28-53a2-4154-a544-f7d641106dc0
        type: Details
        title: Task list guidance
        content: |
          <p class="govuk-body">This task list helps you track your progress through the application. Each section contains one or more tasks that must be completed.</p>
          <p class="govuk-body">Tasks will show as 'Completed' as they are populated. You must complete all sections before you can submit your application.</p>
          <p class="govuk-body">If you need to change any information you have already provided, you can go back to any completed section and update your answers. The status will update automatically as you progress through the application.</p>
        options:
          position: above # Renders component above task list
      - name: helpText
        id: b3676e35-bc96-49f2-957c-09ead7e610ec
        type: Html
        content: |
          <p class="govuk-body">This is some example help text.</p>
          <p class="govuk-body">It can include links to guidance or other information.</p>
        options:
          position: below # Renders component below task list
  - title: Do you have land control?
    id: d40c01ac-f492-4665-90c6-b62a6e58d6aa
    path: /management-control
    controller: TaskPageController
    components:
      - name: hasLandPermissionPreamble
        title: Management control
        type: Html
        content: >-
          <p class="govuk-body">Do you have management control over the land and activities in this application for the full duration of the proposed agreement and option commitment(s) as outlined in the relevant customer guidance (including where appropriate, any countersignature)?</p>
      - name: hasLandPErmission
        title: Do have management control?
        type: YesNoField
        hint: ''
        options: {}
        schema: {}
        shortDescription: Do have management control?
        id: 45052db5-d620-4382-b2ec-918168c98bc7
  - title: You are not eligible for this grant
    path: /you-must-have-permission
    id: 21347447-b831-4074-bc25-a35ac5a9fd8f
    condition: 341c2742-74d4-439e-91ee-641f4e56093f
    components:
      - name: FGyiLS
        id: 2324fb1a-5c1d-4f49-ace0-5a9d5eaa088c
        title: You are not eligible for this grant
        type: Html
        hint: ''
        content: >
          <p class="govuk-body">Sorry, this grant is only available for people with permission over the land.</p>
        options: {}
        schema: {}
  - title: How many acres do you have?
    path: /acre-count
    components:
      - name: acreCountInfo
        type: Html
        title: Html
        content: <p class="govuk-hint">Enter the total number of acres you
          are applying for<br><br>You can apply for up to 1,000 acres</p>
        id: d22f5165-8952-4fb7-9fd3-139f4fb73e53
        options: {}
        schema: {}
      - name: totalAcres
        type: NumberField
        title: Enter number of acres
        options:
          required: true
          classes: govuk-!-width-one-third
          customValidationMessages:
            any.required: Enter the number of acres you have
            number.max: You can apply for for up to 1,000 acres
            number.min: You must have at least 100 acres
        schema:
          min: 100
          max: 1000
          precision: 0
        shortDescription: Enter number of acres
        id: 11311189-f228-449a-90ee-68bbb6640fac
    id: f04b730c-b5f3-4c37-9c89-fb2297153c73
  - title: You are not eligible for this grant
    condition: 53386d88-be5b-4637-8b90-7843f4473d4e
    id: d7848b42-24b3-4ed0-abcc-1c31f967cb25
    path: /not-eligible
    controller: TerminalPageController
    components:
      - name: FGyiLA
        title: You are not eligible for this grant
        type: Html
        hint: ''
        content: >
          <p class="govuk-body">Sorry, this grant is only available for pig
          farmers with between 100 to 1,000 acres</p>
        options: {}
        schema: {}
        id: 10a9cac2-e419-42ee-9baa-b36240aca0c3
  - title: Potential grant funding
    path: /potential-funding
    controller: WmpPotentialFundingController
    id: 0ca92c0d-1318-491f-a461-bad92554dae3
  - path: /check-answers
    controller: SummaryPageController
    title: Check your answers
    id: e18e2a8f-4dcf-4f70-ae75-235752260c51
