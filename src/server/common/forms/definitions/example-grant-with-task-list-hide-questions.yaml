engine: V2
name: Example grant with task list - hide questions
metadata:
  id: 19d14e60-e5bc-40f6-8f32-e1eaa7a0e7af
  enabledInProd: false
  referenceNumberPrefix: EGWTHQ
  supportEmail: support@defra.gov.uk
  cookieConsent:
    enabled: true
    serviceName: Farm and land service
    cookiePolicyUrl: /cookies
    expiryDays: 365
  tasklist:
    returnAfterSection: true # Optional, defaults to true - returns to task list after each section
    showCompletionStatus: true # Optional, defaults to true - show "X of Y" completion status
    showQuestions: false # Optional, defaults to true
    statuses: # Optional completion status display overrides (defaults shown below)
      cannotStart:
        text: 'Cannot start yet'
        classes: 'govuk-tag--grey'
      notStarted:
        text: 'Not started'
        classes: 'govuk-tag--yellow'
      inProgress:
        text: 'In progress'
        classes: 'govuk-tag--blue'
      cannotContinue:
        text: 'On hold'
        classes: 'govuk-tag--purple'
      completed:
        text: 'Completed'
        classes: 'govuk-tag--green'
  grantRedirectRules:
    preSubmission:
      - toPath: '/tasks'
    postSubmission:
      # Cleared
      - fromGrantsStatus: SUBMITTED,REOPENED
        gasStatus: APPLICATION_WITHDRAWN
        toGrantsStatus: CLEARED
        toPath: /start

      # Awaiting amendments
      - fromGrantsStatus: SUBMITTED
        gasStatus: APPLICATION_AMEND
        toGrantsStatus: REOPENED
        toPath: /reopened

      # Offer sent, withdrawn, accepted -> agreements service
      - fromGrantsStatus: 'SUBMITTED'
        gasStatus: 'OFFER_SENT,OFFER_WITHDRAWN,OFFER_ACCEPTED'
        toGrantsStatus: 'SUBMITTED'
        toPath: /agreements

      # Reopened
      - fromGrantsStatus: REOPENED
        gasStatus: default
        toGrantsStatus: REOPENED
        toPath: /reopened

      # Submitted -> confirmation (default for most GAS statuses)
      - fromGrantsStatus: SUBMITTED
        gasStatus: default
        toGrantsStatus: SUBMITTED
        toPath: /confirmation

      # Default fallback
      - fromGrantsStatus: default
        gasStatus: default
        toGrantsStatus: SUBMITTED
        toPath: /confirmation
  permissions:
    enforce: false
  options:
    submitButtonText: Save and continue
  confirmationContent:
    panelTitle: 'Details submitted'
    panelText: 'Your reference number'
    html: |
      <h2 class="govuk-heading-m">What happens next</h2>
      <p class="govuk-body">Defra will email you when your funding offer is available to review. This will be within 5 working days.</p>
      <p class="govuk-body">You will need to sign in to the service to accept your funding offer.</p>
      <p class="govuk-body">You should not start work on the actions you have applied for until:</p>
      <ul class="govuk-list govuk-list--bullet govuk-!-margin-bottom-6">
        <li>you have accepted your offer</li>
        <li>the Rural Payments Agency confirms your start date</li>
      </ul>

      <details class="govuk-details" data-module="govuk-details">
        <summary class="govuk-details__summary">
          <span class="govuk-details__summary-text">
            If you have a question
          </span>
        </summary>
        <div class="govuk-details__text">
          <p class="govuk-body">Contact the Rural Payments Agency if you have a query.</p>
          <p class="govuk-body">
            Telephone: 03000 200 301<br>
            Monday to Friday, 8:30am to 5pm (except bank holidays)</p>
          <p class="govuk-body"><a class="govuk-link" href="https://www.gov.uk/call-charges" target="_blank">Find out about call charges (opens in new tab)</a></p>
          <p class="govuk-body">Email: <a class="govuk-link" href="mailto:ruralpayments@defra.gov.uk">ruralpayments@defra.gov.uk</a></p>
        </div>
      </details>

sections:
  - name: example-task-one
    title: Example task one
    id: 52757632-60cb-437f-a648-cfbc6acdacd0
  - name: example-task-two
    title: Example task two
    id: e6cf973b-3ab2-4906-8807-6cdb81f3ea4d
  - name: example-submit-task
    title: Example check and submit task
    id: 31370d87-fb56-4fb3-aa2b-f35781073300

pages:
  # Landing page - no section
  - title: Apply for Example Grant with Task List
    id: 09a72d78-3684-4cf8-8b11-466d025d4605
    path: /start
    controller: StartPageController
    components:
      - name: introHtml
        id: f4d90bc5-d883-48f6-872c-3c18d3044932
        type: Html
        content: |
          <p class="govuk-body">This is an example of a grant application that uses a task list.</p>
          <p class="govuk-body">There are optional settings within the YAML file under <code>metadata.tasklist</code> that change how the task list behaves.</p>

  # Pre task pages - no section, e.g. eligibility check or confirmation of farm details
  - title: Example Eligibility Check
    id: d930504d-fa5d-4374-8dcc-6a6c66660c1a
    path: /eligibility-check
    components:
      - name: eligibilityCheck
        id: da49f7fa-dc11-418d-bc36-8ae9a3ce9657
        type: YesNoField
        title: Are you eligible to apply for this grant?
        hint: One or more pages can be supplied before the task list and can contain guidance, additional questions or validation.
        options:
          required: true

  - title: Terminal Page Example
    id: 79d7252c-11a4-494d-b824-44f867d75b57
    path: /terminal-page
    controller: TerminalPageController
    components:
      - name: cannotApplyInfo
        id: f2cd114b-7803-4f63-9a75-ede4a627ace9
        title: Html
        type: Html
        content: <p class="govuk-body">This is an example of a Terminal page to give
          details on what conditions have not been met to continue applying for
          the grant.</p>
    condition: fe427aee-bb72-4fb6-99a0-8b2092605efd

  # Task list page
  - title: Example Task List
    id: aa9333de-c8c2-4644-bc83-ace20a916a13
    path: /tasks
    controller: TaskListPageController
    components:
      - name: taskListGuidance
        id: 184a3b28-53a2-4154-a544-f7d641106dc0
        type: Details
        title: Task list guidance
        content: |
          <p class="govuk-body">This task list helps you track your progress through the application. Each task contains one or more task pages that must be completed.</p>
          <p class="govuk-body">Tasks will show as 'Completed' as they are populated. You must complete all tasks before you can submit your application.</p>
          <p class="govuk-body">If you need to change any information you have already provided, you can go back to any completed task and update your answers. The status will update automatically as you progress through the application.</p>
        options:
          position: above # Renders component above task list
      - name: helpText
        id: b3676e35-bc96-49f2-957c-09ead7e610ec
        type: Html
        content: |
          <p class="govuk-body">This is some example help text.</p>
          <p class="govuk-body">It can include links to guidance or other information.</p>
        options:
          position: below # Renders component below task list

  # Task pages - Example task one
  - title: Example multiple components
    id: 523058ea-46f0-44fd-ae79-1a6be652c7f9
    path: /multiple-components-task-page
    section: 52757632-60cb-437f-a648-cfbc6acdacd0
    controller: TaskPageController
    components:
      - name: firstName
        id: 0c1f6b5e-a8a1-4b3c-b11e-95fcbf86cd92
        type: TextField
        title: First name
        options:
          required: true
      - name: middleName
        id: e3891060-77a8-4e91-89a8-09c1574f6d41
        type: TextField
        title: Middle name
        hint: Optional fields are ignored when determining task completion status
        options:
          required: false
      - name: lastName
        id: ac0b1543-5d84-49e4-8969-c71342a8de4d
        type: TextField
        title: Last name
        options:
          required: true

  - title: Example optional choice
    id: 4340dde5-89cc-4809-910a-86d60d3944d8
    path: /optional-choice-task-page
    section: 52757632-60cb-437f-a648-cfbc6acdacd0
    controller: TaskPageController
    components:
      - name: choice
        id: 95510c76-e898-41e2-ad69-148bd081d81f
        type: YesNoField
        title: Example optional choice
        options:
          required: true
          classes: govuk-radios
        shortDescription: Optional choice

  - title: Example conditional question
    id: d310059d-a8cd-4fea-9df8-dd79e0624340
    path: /conditional-question
    section: 52757632-60cb-437f-a648-cfbc6acdacd0
    controller: TaskPageController
    condition: 90c6a203-25f7-4ff2-9f18-afc7da612e52
    components:
      - name: conditionalQuestion
        id: 25368da5-0686-493b-8b8a-dc7ce391b840
        type: YesNoField
        title: Example conditional question
        options:
          required: true
          classes: govuk-radios
        shortDescription: Conditional question

  - title: Example single component
    id: 66deb749-1a9b-4793-80b6-4fbfc5a11124
    path: /single-component-task-page
    section: 52757632-60cb-437f-a648-cfbc6acdacd0
    controller: TaskPageController
    components:
      - name: exampleEmailField
        id: a903e593-4392-43b5-83d1-caa2547e48e4
        type: EmailAddressField
        title: Example email address
        hint: This example uses a custom validation regex to ensure a valid email format - the task cannot be completed until this is correct
        options:
          required: true
          customValidationMessages:
            string.empty: Enter your email address
            string.email: Enter an email address in the correct format, like name@example.com
        schema:
          regex: ^\w+([.-]\w+)*@[a-zA-Z0-9]+(-[a-zA-Z0-9]+)*(\.[a-zA-Z]{2,})+$
        shortDescription: Single component

  # Task pages - Example task two
  - title: Example compound component
    id: 8cbdbf5e-7622-48fe-a722-14d271cb05ef
    path: /compound-component-task-page
    section: e6cf973b-3ab2-4906-8807-6cdb81f3ea4d
    controller: TaskPageController
    components:
      - name: exampleComponentGuidance
        id: 566ad4ff-96e4-4b7c-ab72-e2242eea54be
        type: Html
        content: |
          <p class="govuk-body">This is a compound component (UkAddressField), which includes multiple fields for address details.</p>
          <p class="govuk-body">Optional fields are ignored when determining task completion status.</p>
      - name: exampleAddressField
        id: 28e5213c-12c9-4e7f-bbdd-6adc5d561cb0
        type: UkAddressField
        title: Example address
        shortDescription: Compound component

  - title: Select land parcel for actions
    id: f9f1a33b-2fb5-4418-951b-680067efc179
    path: /select-land-parcel
    section: e6cf973b-3ab2-4906-8807-6cdb81f3ea4d
    controller: CommonSelectLandParcelPageController
    components:
      - name: landParcels
        type: CheckboxesField
        title: Select land parcels
        shortDescription: Land parcels
    config:
      enableMultipleParcelSelect: false
      bottomSection: |
        <p class="govuk-body">You will be able to add actions to the other land parcels before submitting your application.</p>
      selectionHint: Use your map to check these parcel IDs against your land parcels.
      supportDetailsSummaryText: If you have a question
      supportDetailsHtml: |
        <p class="govuk-body">Contact the Rural Payments Agency (RPA) if you have a query.</p>
        <p class="govuk-body">Telephone: <a href="tel:03000200301" class="telephone-link" aria-label="Call us on 03000 200 301">03000 200 301</a></p>
        <p class="govuk-body">Monday to Friday, 8:30am to 5pm (except bank holidays)</p>
        <p class="govuk-body">
          <a href='https://www.gov.uk/call-charges' target='_blank'>
            Find out about call charges (opens in new tab)
          </a>
        </p>
        <p class="govuk-body">Email: <a href='mailto:farmpayments@rpa.gov.uk'>farmpayments@rpa.gov.uk</a></p>
        <p class="govuk-body">The RPA responds to email queries within 10 working days</p>

  - title: Example with guidance
    id: 5da5dc71-0e34-4a8a-811e-eb7595b088b8
    path: /example-task-with-guidance
    section: e6cf973b-3ab2-4906-8807-6cdb81f3ea4d
    controller: TaskPageController
    components:
      - name: examplePageGuidance
        id: 40d355b6-fb00-40cb-96db-8de113a94345
        type: Html
        content: |
          <p class="govuk-body">This task page includes some additional guidance to assist the user.</p>
      - name: exampleNumberField
        id: 4cde50e0-98c7-4b0f-badb-e9ce6e6dac3f
        type: NumberField
        title: Example number field
        options:
          required: true
        shortDescription: Number with guidance

  # Task pages - Example check and submit task
  - title: Check your answers
    path: /summary
    section: 31370d87-fb56-4fb3-aa2b-f35781073300
    controller: CheckResponsesPageController
    id: 608e4bcd-7019-4932-b412-25f892615d8d

  - title: Confirm and send
    id: 9817cd3a-c9ae-49f1-8a95-076a82504d25
    path: /declaration
    section: 31370d87-fb56-4fb3-aa2b-f35781073300
    controller: DeclarationPageController

  # Off-journey page: never reached by the default V2 page walk because it is
  # positioned after the final journey page. It is only entered via a direct
  # link or a grantRedirectRule. Its custom controller reads the `next.path`
  # below to decide where "Continue" goes.
  - title: Landing page example
    id: 56b69d36-e1f0-486c-bc31-5c07b183c1bf
    path: /reopened
    controller: LandingPageController
    components:
      - name: reopenedHtml
        id: d1333e11-cc50-4cd0-9f5a-c63a0ec5ec92
        type: Html
        content: |
          <p class="govuk-body">Landing pages can be used as redirect targets for GAS/Grants statuses, to give users information about the status of their application before continuing to a journey page.</p>
          <p class="govuk-body">For example, if Grants Status becomes `REOPENED`:</p>
          <p class="govuk-body">Your application <strong>{{ context.referenceNumber }}</strong> has been reopened. Click continue to check your submitted answers and change them.</p>
    next:
      - path: /tasks

conditions:
  - id: fe427aee-bb72-4fb6-99a0-8b2092605efd
    displayName: continueNo
    items:
      - id: 0572f3b3-bfdc-4996-b9ce-137642107ffa
        componentId: da49f7fa-dc11-418d-bc36-8ae9a3ce9657
        operator: is
        type: BooleanValue
        value: false
  - id: 90c6a203-25f7-4ff2-9f18-afc7da612e52
    displayName: conditionalQuestionYes
    items:
      - id: ce321d59-6268-43bd-86a5-942d6407164b
        componentId: 95510c76-e898-41e2-ad69-148bd081d81f
        operator: is
        type: BooleanValue
        value: true

lists: []
schema: 2
