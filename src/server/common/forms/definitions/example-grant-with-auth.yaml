engine: V2
name: Example grant with auth
metadata:
  id: 9f9c5ec4-e237-4e6e-b67c-f232a6377d76
  enabledInProd: false
  referenceNumberPrefix: EGWA
  supportEmail: support@defra.gov.uk
  cookieConsent:
    enabled: true
    serviceName: Farm and land service
    cookiePolicyUrl: /cookies
    expiryDays: 365
  submission:
    submissionSchemaPath: ./schemas/example-grant-with-auth-submission.schema.json
  grantRedirectRules: null
  detailsPage:
    toleratedFailurePaths:
      - countyParishHoldings
    query:
      name: Business
      entities:
        - name: customer
          variableName: crn
          variableSource: credentials.crn
          fields:
            - path: info
              fields:
                - path: name
                  fields:
                    - path: title
                    - path: first
                    - path: middle
                    - path: last
        - name: business
          variableName: sbi
          variableSource: credentials.sbi
          fields:
            - path: info
              fields:
                - path: reference
                - path: email
                  fields:
                    - path: address
                - path: phone
                  fields:
                    - path: mobile
                    - path: landline
                - path: name
                - path: address
                  fields:
                    - path: line1
                    - path: line2
                    - path: line3
                    - path: line4
                    - path: line5
                    - path: street
                    - path: city
                    - path: postalCode
                    - path: uprn
                    - path: county
                    - path: buildingName
                    - path: buildingNumberRange
                    - path: dependentLocality
                    - path: doubleDependentLocality
                    - path: flatName
                    - path: pafOrganisationName
                - path: vat
            - path: countyParishHoldings
              fields:
                - path: cphNumber
    responseMapping:
      business: data.business.info
      countyParishHoldings: data.business.countyParishHoldings[0].cphNumber
      customer: data.customer.info
    displaySections:
      - title: Applicant details
        fields:
          - label: Applicant name
            sourcePath: customer.name
            format: fullName
      - title: Organisation details
        fields:
          - label: Organisation name
            sourcePath: business.name
          - label: Single Business Identifier (SBI) number
            sourceType: credentials
            sourcePath: sbi
          - label: Business reference
            sourcePath: business.reference
          - label: Organisation email
            sourcePath: business.email.address
          - label: Mobile phone number
            sourcePath: business.phone.mobile
          - label: Landline phone number
            sourcePath: business.phone.landline
          - label: Organisation address
            sourcePath: business.address
            format: address
          - label: VAT registration number
            sourcePath: business.vat
      - title: County parish holding (CPH) numbers
        fields:
          - label: CPH number
            sourcePath: countyParishHoldings
  printPage:
    showApplicantDetails: true
    configurablePrintContent:
      html: |
        <h2 class="govuk-heading-m">Configurable content</h2>
        <p class="govuk-body">This is an example of configurable content on the print page, defined via the <strong>configurablePrintContent</strong> property in the form YAML metadata.</p>
        <p class="govuk-body">It supports HTML markup and the <strong>{{SLUG}}</strong> placeholder.</p>
  confirmationContent:
    panelTitle: 'Details submitted'
    panelText: 'Your reference number'
    html: |
      <h2 class="govuk-heading-m">What happens next</h2>
      <p class="govuk-body">Defra will email you when your funding offer is available to review. This will be within 5 working days.</p>
      <p class="govuk-body">You will need to sign in to the service to accept your funding offer.</p>
      <p class="govuk-body">You should not start work on the actions you have applied for until:</p>
      <ul class="govuk-list govuk-list--bullet govuk-!-margin-bottom-6">
        <li>you have accepted your offer</li>
        <li>the Rural Payments Agency confirms your start date</li>
      </ul>

      <p class="govuk-body"><a class="govuk-link" href="/{{SLUG}}/print-submitted-application" target="_blank">View / Print submitted application (opens in new tab)</a></p>

      <details class="govuk-details" data-module="govuk-details">
        <summary class="govuk-details__summary">
          <span class="govuk-details__summary-text">
            If you have a question
          </span>
        </summary>
        <div class="govuk-details__text">
          <p class="govuk-body">Contact the Rural Payments Agency if you have a query.</p>
          <p class="govuk-body">
            Telephone: 03000 200 301<br>
            Monday to Friday, 8:30am to 5pm (except bank holidays)</p>
          <p class="govuk-body"><a class="govuk-link" href="https://www.gov.uk/call-charges" target="_blank">Find out about call charges (opens in new tab)</a></p>
          <p class="govuk-body">Email: <a class="govuk-link" href="mailto:ruralpayments@defra.gov.uk">ruralpayments@defra.gov.uk</a></p>
        </div>
      </details>
pages:
  - title: Example Grant
    path: /start
    controller: StartPageController
    components:
      - name: startInfoOne
        title: Html
        type: Html
        content: <p class="govuk-body">This service uses DefraID and the Save and Return
          feature, and demonstrates the use of the following components and page
          types:</p>
        id: 434ab3dc-fad9-44c5-8601-b19477a1d77e
        options: {}
        schema: {}
      - name: startComponentsDetail
        title: Components
        type: Details
        content: |+
          <ul class="govuk-list govuk-list--bullet">
            <li>YesNoField</li>
            <li>AutocompleteField</li>
            <li>RadiosField</li>
            <li>CheckboxesField</li>
            <li>NumberField</li>
            <li>DatePartsField</li>
            <li>MonthYearField</li>
            <li>SelectField</li>
            <li>MultilineTextField</li>
            <li>EmailAddressField</li>
            <li>TelephoneNumberField</li>
            <li>UkAddressField</li>
            <li>EastingNorthingField</li>
            <li>OsGridRefField</li>
            <li>NationalGridFieldNumberField</li>
            <li>LatLongField</li>
            <li>GeospatialField</li>
            <li>HiddenField</li>
            <li>TextField</li>
          </ul>

        id: dc4b8bac-ac3d-43ba-ae28-575997f8836d
        options: {}
        schema: {}
      - name: startPagesDetails
        title: Page types
        type: Details
        content: |+
          <ul class="govuk-list govuk-list--bullet">
            <li>Check details page</li>
            <li>Terminal page</li>
            <li>Conditional page</li>
            <li>Repeat page</li>
            <li>Summary page</li>
            <li>Declaration page</li>
            <li>Confirmation page</li>
          </ul>

        id: 884fd5d0-12da-4156-8396-348cce116c96
        options: {}
        schema: {}
      - name: startInsetText
        title: Inset text
        type: InsetText
        content: |
          This page demonstrates the use of guidance components:
          <br>
          Details, InsetText, Html and Markdown.
        id: 4e5014d2-7f6a-4e9f-9fa4-01fd5978db4e
        options: {}
        schema: {}
      - name: startMarkdown
        title: Markdown
        type: Markdown
        content: |
          Pages can use Markdown like headers and text formatting
          e.g. *italic*, **bold** and ~~strikethrough~~
        id: 5bc4496e-c806-478e-9287-907fa317bff2
        options: {}
        schema: {}
    id: 89f408cd-6953-4f6b-b31c-f957c520fb67
  - title: Check your details
    path: /check-details
    controller: CheckDetailsController
    id: f7a2c8b1-3d4e-5f6a-7b8c-9d0e1f2a3b4c
  - title: YesNoField Example
    path: /yes-no-field
    components:
      - name: yesNoField
        title: Yes or No
        hint: Selecting 'No' will demonstrate navigating to a Terminal page to end the
          application
        type: YesNoField
        options:
          customValidationMessages:
            any.required: Select 'Yes' to continue
        shortDescription: Yes or No
        id: 33b2a118-efb3-45b3-a926-22fed2360bf7
        schema: {}
    id: d02c043c-6ca2-4d9d-a4a8-b299e5735f7d
  - title: Terminal Page Example
    path: /terminal-page
    controller: TerminalPageController
    components:
      - name: cannotApplyInfo
        title: Html
        type: Html
        content: <p class="govuk-body">This is an example of a Terminal page to give
          details on what conditions have not been met to continue applying for
          the grant.</p>
        id: 19aa43e5-3d6c-45fc-a7f8-8c7d0b43ea0e
        options: {}
        schema: {}
    condition: 048e4fdd-6c54-4a9d-9bc5-c9d90470b07b
    id: 94e31c5a-b58e-45bb-b4e0-5960f442dd65
  - title: AutocompleteField Example
    path: /autocomplete-field
    components:
      - name: listComponentInfo
        title: Html
        type: Html
        content: <p class="govuk-body">This is an example of a List guidance component
          and an AutocompleteField.</p>
        id: b0e40157-875a-4fda-97b4-9809cd4f2f28
        options: {}
        schema: {}
      - name: supportedCountries
        title: Countries
        type: List
        list: bf5432a9-a4b1-4e01-b4c8-3052ad4be056
        id: f1831087-fc60-4384-8ffb-b82d7522ab01
        options: {}
        schema: {}
      - name: autocompleteField
        title: Country
        type: AutocompleteField
        list: bf5432a9-a4b1-4e01-b4c8-3052ad4be056
        hint: Start typing to see a filtered list of countries to select from
        options:
          customValidationMessages:
            any.required: Enter a country
        shortDescription: Country
        id: 26958e3c-d6d7-4bec-833b-7661e37a62e7
        schema: {}
    id: 728cd1be-ed3b-453c-aaf6-acacfc57742f
  - title: RadiosField Example
    path: /radios-field
    components:
      - name: radiosInfo
        title: Html
        type: Html
        content: <p class="govuk-body">This is an example of a RadiosField component.
          Options can be configured to go to Terminal pages or Conditional
          pages.</p>
        id: 545895da-dc16-4bd6-8d6a-4308277982df
        options: {}
        schema: {}
      - name: radiosField
        title: Radio option
        type: RadiosField
        list: 57f1e7a6-d27a-4144-ace6-6ddacad103df
        hint: Selecting the first option demonstrates navigating to an optional page
          before continuing
        options:
          customValidationMessages:
            any.required: Select the option that applies
        shortDescription: Radio option
        id: b48a816e-a810-4346-a111-5c7a0cac8a5b
        schema: {}
    id: 5cd9ac2a-d211-4f8e-b1b9-1a377d121148
  - title: Conditional Page Example
    path: /conditional-page
    components:
      - name: conditionalPageInfo
        title: Html
        type: Html
        content: '<p class="govuk-body">This is an example of a Conditional Page. You
          must meet certain conditions before you submit a full application.</p>
          '
        id: c62adf1e-8175-4226-a614-2f889a254036
        options: {}
        schema: {}
    condition: 7fd31ec4-1e35-4ed8-9f81-c41928f4c8a7
    id: ec8b2f9b-efcc-4019-b4ff-f64675becf4c
  - title: CheckboxesField Example
    path: /checkboxes-field
    components:
      - name: checkboxesField
        title: Checkbox options
        hint: >-
          Use checkboxes to allow selection of one or more options.

          This example requires at least one selection, but the component can be
          set to optional.
        type: CheckboxesField
        list: aae88d9a-2b7b-4a49-a7f4-1482d86e6be6
        options:
          required: true
        shortDescription: Checkbox options
        id: b9c60a2f-2c1a-43fd-96f0-7ea6a566ca9a
        schema: {}
    id: 738a8007-fc6e-4a23-b284-d68be8bf02ee
  - title: Checkbox follow-up
    path: /checkboxes-follow-up
    components:
      - name: checkboxesFollowUpInfo
        title: Html
        type: Html
        content: |
          <p class="govuk-body">You selected option three. This page demonstrates routing when a CheckboxesField <em>contains</em> a specific list item (the operator : contains condition on a ListItemRef). The journey runner ticks only the first option, so this page is only reached when you select option three manually.</p>
        id: e6d9fda0-1b2c-3d4e-5f6a-7b8c9daebfc0
        options: {}
        schema: {}
    condition: f7eaaeb1-2c3d-4e5f-6a7b-8c9daebfc0d1
    id: d5c8ecf9-0a1b-2c3d-4e5f-6a7b8c9daebf
  - title: NumberField with validation
    path: /number-field-validation
    components:
      - name: numberFieldValidationInfo
        type: Html
        title: Html
        content: |
          <p class="govuk-body">This page demonstrates a NumberField with schema-level validation. The engine rejects values outside £10,000 to £999,999 and re-renders the page with a custom error message. You cannot move on until the value is in range.</p>
        id: dc6894f1-b7b1-4873-8adb-7ac869da21f7
        options: {}
        schema: {}
      - name: numberFieldValidation
        type: NumberField
        title: Enter amount
        options:
          prefix: £
          required: true
          autocomplete: off
          classes: govuk-!-width-one-third
          customValidationMessages:
            any.required: Enter the numeric value
            number.max: Enter a value less than £1 million
            number.min: Enter a value of £10,000 or more
        schema:
          min: 10000
          max: 999999
          precision: 0
        shortDescription: Enter amount
        id: 4643daa8-d84a-4a1b-942c-3e5f8b53a5ad
    id: 57ee940c-a2ab-4c98-8733-887fb5c0d396
  - title: NumberField with conditional routing
    path: /number-field-routing
    components:
      - name: numberFieldRoutingInfo
        type: Html
        title: Html
        content: |
          <p class="govuk-body">This page demonstrates a NumberField that drives <em>conditional routing</em>: any value is accepted, but values over £100,000 send the user to the next page (/number-too-high) via an operator : is more than condition on a NumberValue.</p>
        id: 7c3d2e1f-9a8b-4c5d-8e6f-1a2b3c4d5e6f
        options: {}
        schema: {}
      - name: numberFieldRouting
        type: NumberField
        title: Enter amount that may divert the journey
        options:
          prefix: £
          required: true
          autocomplete: off
          classes: govuk-!-width-one-third
          customValidationMessages:
            any.required: Enter the numeric value
        schema:
          precision: 0
        shortDescription: Routing amount
        id: 8d4e3f2a-0b9c-4d5e-9f7a-2b3c4d5e6f7a
    id: 9e5f4a3b-1c0d-4e6f-8a7b-3c4d5e6f7a8b
  - title: Number too high
    path: /number-too-high
    controller: TerminalPageController
    components:
      - name: numberTooHighInfo
        title: Html
        type: Html
        content: |
          <p class="govuk-body">The amount entered on the previous page is over £100,000. This page demonstrates routing when a NumberField exceeds a threshold (the operator : is more than condition on a NumberValue, applied to the <em>routing</em> NumberField on the previous page, not the validation NumberField). The journey runner enters £50,000 by default, so this page is only reached when you enter a higher value manually.</p>
        id: a2f5b9c6-7d8e-9f0a-1b2c-3d4e5f6a7b8c
        options: {}
        schema: {}
    condition: b3a6cad7-8e9f-0a1b-2c3d-4e5f6a7b8c9d
    id: f1e4a8b5-6c7d-8e9f-0a1b-2c3d4e5f6a7b
  - title: DatePartsField Example
    path: /date-parts-field
    components:
      - name: datePartsField
        title: Date
        hint: Cannot be in the past and must be within the next 90 days.
        type: DatePartsField
        options:
          autocomplete: off
          maxDaysInPast: 1
          maxDaysInFuture: 90
          required: true
        shortDescription: Date
        id: 70367a37-e152-4db3-94f8-8b1249481234
        schema: {}
    id: ae8788f2-a495-4e95-9ae0-34e7ee177788
  - title: MonthYearField Example
    path: /month-year-field
    components:
      - name: monthYearField
        title: Month and year
        hint: Allows entry of dates with just a month and year.
        type: MonthYearField
        options:
          required: true
        shortDescription: Month and year
        id: d357b94e-ca25-4ea1-8b01-daa4851a8767
        schema: {}
    id: 16d61e73-68bb-465a-a9c3-fa05c41de16c
  - title: SelectField Example
    path: /select-field
    components:
      - name: selectFieldInfo
        title: Html
        type: Html
        content: <p class="govuk-body">This is an example of a SelectField.</p>
        id: 6ea49c90-ae00-426a-8491-4586b9e6a5f1
        options: {}
        schema: {}
      - name: selectField
        title: Select option
        type: SelectField
        list: d43f6210-34f7-4619-a6cc-30fd579ae85f
        options:
          required: true
        shortDescription: Select option
        id: e21204ba-abb5-4b1d-9d84-c7750d877af2
        schema: {}
    id: ee00619a-ee21-45cf-a28f-05d28098a103
  - title: MultilineTextField Example
    path: /multiline-text-field
    components:
      - name: multilineTextField
        title: Description
        type: MultilineTextField
        options:
          required: true
          rows: 10
          maxWords: 400
          customValidationMessages:
            string.empty: Enter a description
        shortDescription: Description
        id: 264fbff1-35f6-49d3-98ae-b7582b1e41b5
        schema: {}
    id: 88d7b067-68c2-4fe1-9a9a-ea98f0752e03
  - title: EmailAddressField Example
    path: /email-address-field
    components:
      # EmailAddressField uses Joi's built-in `.email()` validator. The engine
      # ignores `schema.regex`/`schema.max` for this component, so the GDS-
      # recommended 254 character cap cannot be enforced via YAML. You would need
      # a custom controller or upstream change to forms-engine-plugin.
      # Engine sets type="email" and autocomplete="email" automatically.
      - name: emailAddressField
        title: Email address
        type: EmailAddressField
        hint: We'll only use this to contact you about your application
        options:
          required: true
          customValidationMessages:
            string.empty: Enter your email address
            string.email: Enter an email address in the correct format, like name@example.com
            any.required: Enter your email address
        shortDescription: Email address
        id: f2b3c4d5-e6f7-4a8b-9c0d-1e2f3a4b5c6d
        schema: {}
    id: e1a2b3c4-d5e6-4f7a-8b9c-0d1e2f3a4b5c
  - title: TelephoneNumberField Example
    path: /telephone-number-field
    components:
      # TelephoneNumberField only enforces a hardcoded character pattern
      # (digits, spaces, +, brackets, hyphens). Length is NOT validated:
      # the engine's TelephoneNumberField ignores schema.min/max. The hint
      # below documents the expected length for users; enforce it via a
      # custom controller or upstream change to forms-engine-plugin if needed.
      - name: telephoneNumberField
        title: Telephone number
        type: TelephoneNumberField
        hint: |
          Use numbers only, with spaces, brackets, hyphens or a leading + for the country code.
          UK numbers are usually 11 digits, for example 01234 567890. International numbers are typically 8 to 15 digits, for example +44 1234 567890.
        options:
          required: true
          autocomplete: tel
          classes: govuk-input--width-20
          customValidationMessages:
            string.empty: Enter a telephone number, like 01632 960 001, 07700 900 982 or +44 808 157 0192
            any.required: Enter a telephone number, like 01632 960 001, 07700 900 982 or +44 808 157 0192
            string.pattern.base: Enter a telephone number using only numbers, spaces, brackets, hyphens or a leading +
        shortDescription: Telephone number
        id: b4c5d6e7-f8a9-4b0c-9d1e-3f4a5b6c7d8e
        schema: {}
    id: a3b4c5d6-e7f8-4a9b-8c0d-2e3f4a5b6c7d
  - title: UkAddressField Example
    path: /uk-address-field
    components:
      - name: ukAddressFieldInfo
        title: Html
        type: Html
        content: |
          <p class="govuk-body">This is a compound component (UkAddressField), which renders multiple inputs for the parts of a UK address.</p>
        id: d6e7f8a9-b0c1-4d2e-9f3a-5b6c7d8e9fa0
        options: {}
        schema: {}
      # UkAddressField is configured by the engine to match the GDS address pattern:
      # autocomplete address-line1/2, address-level2 (town), address-level1 (county),
      # postal-code; town width-two-thirds, postcode width-10; required = address line 1,
      # town, postcode; max 100 chars per line; postcode regex tolerates case and an
      # optional internal space. Engine gap vs GDS: postcode regex does NOT accept
      # punctuation (hyphens, brackets, full stops) that GDS recommends accepting.
      - name: ukAddressField
        title: Address
        type: UkAddressField
        options:
          required: true
        shortDescription: Address
        id: e7f8a9b0-c1d2-4e3f-8a4b-6c7d8e9fa0b1
        schema: {}
    id: c5d6e7f8-a9b0-4c1d-8e2f-4a5b6c7d8e9f
  - title: Location components Example
    path: /location-components
    components:
      - name: locationComponentsInfo
        title: Html
        type: Html
        content: |
          <p class="govuk-body">This page demonstrates location components on a single page: EastingNorthingField, OsGridRefField, NationalGridFieldNumberField, LatLongField and GeospatialField.</p>
        id: 8d2a6c4f-4b3e-4c6d-8e1f-9a7b8c4d5e6f
        options: {}
        schema: {}
      - name: eastingNorthingField
        title: Easting and northing
        hint: British National Grid coordinates. Easting 0 to 700000, northing 0 to 1300000.
        type: EastingNorthingField
        options:
          required: true
        shortDescription: Easting and northing
        id: 9e3b7d5a-4c4f-4d7e-9f2a-ab8c9d5e6f70
        schema: {}
      - name: osGridRefField
        title: OS national grid reference
        hint: Two letters and 6, 8 or 10 digits, for example ST 678 678 or SO 12345 12345.
        type: OsGridRefField
        options:
          required: true
          customValidationMessages:
            string.empty: Enter an OS grid reference
        shortDescription: OS grid reference
        id: af4c8e6b-4d5a-4e8f-8a3b-bc9dae6f7081
        schema: {}
      - name: nationalGridFieldNumberField
        title: National Grid field number
        hint: Two letters and 8 digits in 2 blocks of 4, for example NG 1234 5678.
        type: NationalGridFieldNumberField
        options:
          required: true
          customValidationMessages:
            string.empty: Enter a National Grid field number
          classes: govuk-input--width-10
        shortDescription: National Grid field number
        id: b05d9f7c-4e6b-4f9a-9b4c-cdaebf708192
        schema: {}
      - name: latLongField
        title: Latitude and longitude
        hint: Decimal degrees within Great Britain. Latitude 49.85 to 60.859, longitude -13.687 to 1.767.
        type: LatLongField
        options:
          required: true
        shortDescription: Latitude and longitude
        id: c16ea08d-4f7c-4a0b-8c5d-deafc08192a3
        schema: {}
      - name: geospatialFieldFormat
        title: Format
        type: Details
        content: |
          <p class="govuk-body">Enter a JSON array (between 1 and 50 items) of GeoJSON-style features. Each feature requires:</p>
          <ul class="govuk-list govuk-list--bullet">
            <li><code>id</code> — unique string</li>
            <li><code>type</code> — must be <code>"Feature"</code></li>
            <li><code>properties.description</code> — string</li>
            <li><code>properties.coordinateGridReference</code> — string</li>
            <li><code>properties.centroidGridReference</code> — string</li>
            <li><code>geometry.type</code> — <code>"Point"</code>, <code>"LineString"</code> or <code>"Polygon"</code></li>
            <li><code>geometry.coordinates</code> — <code>[longitude, latitude]</code> for Point; an array of at least 2 such pairs for LineString; an array of rings (each at least 3 pairs) for Polygon</li>
          </ul>
          <p class="govuk-body">Example (one Point feature):</p>
          <pre class="govuk-body"><code>[
            {
              "id": "a",
              "type": "Feature",
              "properties": {
                "description": "Example location",
                "coordinateGridReference": "ST 00001",
                "centroidGridReference": "ST 00001"
              },
              "geometry": {
                "type": "Point",
                "coordinates": [-2.5723699, 53.2380485]
              }
            }
          ]</code></pre>
        id: c08fa30a-4b9c-4d0e-8f1a-1c2d3e4f5061
        options: {}
        schema: {}
      - name: geospatialField
        title: GeospatialField
        hint: Enter a JSON array of GeoJSON features (see the format guidance above).
        type: GeospatialField
        options:
          required: true
        shortDescription: GeospatialField
        id: d27fb19e-4a8d-4b1c-9d6e-efb019283b40
        schema: {}
    id: 7c1f5b3e-4a2d-4b5c-9d0e-8f6a7b3c4d5e
  - title: HiddenField Example
    path: /hidden-field
    components:
      - name: hiddenFieldInfo
        title: Html
        type: Html
        content: |
          <p class="govuk-body">This page demonstrates a HiddenField. The component renders an <code>&lt;input type="hidden"&gt;</code> with no visible label, so users see only the surrounding guidance and the submit button. Hidden fields are typically populated by upstream pages, controllers or query parameters; here it is configured as optional so the journey can submit without a value.</p>
        id: f4912d3a-4c0f-4d3e-9f80-01d23b4a5d62
        options: {}
        schema: {}
      - name: hiddenField
        title: Hidden field
        type: HiddenField
        options:
          required: false
        shortDescription: Hidden field
        id: 05a23e4b-4310-4e4f-8a91-12e34c5b6e73
        schema: {}
    id: e3801c2f-4b9e-4c2d-8e7f-f0c12a394c51
  - title: Multi Field Form Example
    path: /multi-field-form
    components:
      - name: formInfo
        title: Html
        type: Html
        content: >-
          <p class="govuk-body">This is an example of a form containing multiple
          components on the same page.<br>
        id: 96f851a6-8758-42dd-9df5-e85e89b8cc14
        options: {}
        schema: {}
      - type: TextField
        name: projectName
        title: Project name
        options:
          required: true
          customValidationMessages:
            string.empty: Enter a project name
            string.max: Project name must be 100 characters or fewer
        schema:
          max: 100
        shortDescription: Project name
        id: 1f2a3b4c-5d6e-4a8b-9c0d-1e2f3a4b5c6d
      - type: MultilineTextField
        name: projectDescription
        title: Project description
        hint: Optional. Describe your project in up to 200 words.
        options:
          required: false
          rows: 5
          maxWords: 200
        shortDescription: Project description
        id: 2a3b4c5d-6e7f-4a9b-8c0d-1e2f3a4b5c7e
      - type: NumberField
        name: projectBudget
        title: Project budget
        hint: Enter the total project budget in pounds, for example 50000
        options:
          prefix: £
          required: true
          autocomplete: off
          classes: govuk-!-width-one-third
          customValidationMessages:
            any.required: Enter the project budget
            number.max: Enter a value less than £1 million
            number.min: Enter a value of £1 or more
        schema:
          min: 1
          max: 999999
          precision: 0
        shortDescription: Project budget
        id: 3b4c5d6e-7f8a-4b9c-9d0e-1f2a3b4c5d8f
